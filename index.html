<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multichat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0e0e10;
        color: #efeff1;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #18181b;
        border-bottom: 2px solid #53fc18;
        display: flex;
        flex-direction: column;
      }

      .header-top {
        display: flex;
        align-items: center;
        padding: 10px 24px;
        gap: 12px;
      }

      .header h1 {
        color: #53fc18;
        font-size: 1.4rem;
        white-space: nowrap;
      }

      .header-toggle {
        margin-left: auto;
        background: #2a2a2e;
        border: 1px solid #3a3a3e;
        color: #efeff1;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          border-color 0.2s;
        flex-shrink: 0;
      }

      .header-toggle:hover {
        background: #3a3a3e;
        border-color: #53fc18;
      }

      .header-toggle svg {
        width: 18px;
        height: 18px;
        fill: #efeff1;
        transition: transform 0.3s ease;
      }

      .header-toggle .hamburger-line {
        transition:
          transform 0.3s ease,
          opacity 0.2s ease;
        transform-origin: center;
      }

      .header-toggle.open .hamburger-line:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      .header-toggle.open .hamburger-line:nth-child(2) {
        opacity: 0;
      }

      .header-toggle.open .hamburger-line:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }

      .controls-wrapper {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease;
      }

      .controls-wrapper.open {
        max-height: 80px;
        padding: 0 24px 12px;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .controls input {
        background: #2a2a2e;
        border: 1px solid #3a3a3e;
        color: #efeff1;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 0.95rem;
        flex: 1;
        min-width: 200px;
        outline: none;
        transition: border-color 0.2s;
      }

      .controls input:focus {
        border-color: #53fc18;
      }

      .controls input::placeholder {
        color: #888;
      }

      .controls button {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        white-space: nowrap;
      }

      .controls button:active {
        transform: scale(0.97);
      }

      #connectBtn {
        background: #53fc18;
        color: #0e0e10;
      }

      #connectBtn:hover {
        background: #45d414;
      }

      #connectBtn:disabled {
        background: #3a3a3e;
        color: #888;
        cursor: not-allowed;
      }

      #disconnectBtn {
        background: #e91916;
        color: #fff;
      }

      #disconnectBtn:hover {
        background: #c41412;
      }

      #disconnectBtn:disabled {
        background: #3a3a3e;
        color: #888;
        cursor: not-allowed;
      }

      #clearBtn {
        background: #2a2a2e;
        color: #efeff1;
        border: 1px solid #3a3a3e;
      }

      #clearBtn:hover {
        background: #3a3a3e;
      }

      .chat-wrapper {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .chat-container {
        height: 100%;
        overflow-y: auto;
        padding: 12px 24px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .chat-container::-webkit-scrollbar {
        width: 6px;
      }

      .chat-container::-webkit-scrollbar-track {
        background: #18181b;
      }

      .chat-container::-webkit-scrollbar-thumb {
        background: #3a3a3e;
        border-radius: 3px;
      }

      .chat-msg {
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.9rem;
        line-height: 1.4;
        word-wrap: break-word;
        transition: background 0.15s;
        animation: fadeIn 0.2s ease;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .chat-msg:hover {
        background: #1f1f23;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .chat-avatar {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        flex-shrink: 0;
        object-fit: cover;
        margin-top: 1px;
      }

      .chat-msg-body {
        min-width: 0;
      }

      .chat-channel {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 4px;
        margin-right: 6px;
        display: inline-block;
      }

      .chat-username {
        font-weight: 700;
        margin-right: 4px;
      }

      .chat-username::after {
        content: ":";
      }

      .chat-content {
        color: #d1d1d6;
      }

      .chat-content img {
        height: 28px;
        vertical-align: middle;
        margin: 0 2px;
      }

      .system-msg {
        color: #888;
        font-style: italic;
        font-size: 0.85rem;
        padding: 4px 10px;
        margin-left: 30px;
      }

      .msg-count {
        color: #888;
        font-size: 0.85rem;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #555;
        gap: 12px;
      }

      .empty-state svg {
        width: 64px;
        height: 64px;
        opacity: 0.3;
      }

      .resume-scroll-btn {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #53fc18;
        color: #0e0e10;
        border: none;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 16px rgba(83, 252, 24, 0.3);
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
      }

      .resume-scroll-btn.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .resume-scroll-btn:hover {
        background: #45d414;
      }

      .resume-scroll-btn svg {
        width: 14px;
        height: 14px;
        fill: #0e0e10;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-top">
        <h1>Kick Multichat</h1>
        <button
          class="header-toggle"
          id="headerToggle"
          onclick="toggleControls()"
          title="Toggle controls"
        >
          <svg viewBox="0 0 24 24" width="18" height="18">
            <rect
              class="hamburger-line"
              x="3"
              y="5"
              width="18"
              height="2"
              rx="1"
              fill="#efeff1"
            />
            <rect
              class="hamburger-line"
              x="3"
              y="11"
              width="18"
              height="2"
              rx="1"
              fill="#efeff1"
            />
            <rect
              class="hamburger-line"
              x="3"
              y="17"
              width="18"
              height="2"
              rx="1"
              fill="#efeff1"
            />
          </svg>
        </button>
      </div>
      <div class="controls-wrapper" id="controlsWrapper">
        <div class="controls">
          <input
            type="text"
            id="channelInput"
            placeholder="Enter channels separated by commas (e.g. xqc, trainwreckstv, ac7ionman)"
          />
          <button id="connectBtn" onclick="connect()">Connect</button>
          <button id="disconnectBtn" onclick="disconnect()" disabled>
            Disconnect
          </button>
          <button id="clearBtn" onclick="clearChat()">Clear</button>
        </div>
      </div>
    </div>

    <div class="chat-wrapper">
      <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
            />
          </svg>
          <p>Enter channel names above and click Connect</p>
        </div>
      </div>
      <button
        class="resume-scroll-btn"
        id="resumeScrollBtn"
        onclick="resumeAutoScroll()"
      >
        <svg viewBox="0 0 24 24">
          <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" />
        </svg>
        Resume Auto-Scroll
      </button>
    </div>

    <script>
      const PUSHER_WS_URL =
        "wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=8.4.0-rc2&flash=false";

      const channelAvatars = {};

      class KickChat {
        constructor() {
          this.ws = null;
          this.onMessage = null;
          this.channelMap = {};
        }

        static async listen(channels, callback) {
          const chat = new KickChat();
          return chat.start(channels, callback);
        }

        async start(channels, callback) {
          this.onMessage = callback;

          const channelList = Array.isArray(channels) ? channels : [channels];

          const resolved = await Promise.all(
            channelList.map(async (ch) => {
              const name = String(ch).trim().toLowerCase();
              if (!isNaN(ch)) return { name, id: Number(ch), avatar: null };
              const info = await this._getChannelInfo(name);
              if (!info) throw new Error(`Channel not found: ${name}`);
              return { name, id: info.chatroomId, avatar: info.avatar };
            }),
          );

          this.channelMap = {};
          resolved.forEach((r) => {
            this.channelMap[`chatrooms.${r.id}.v2`] = r.name;
            if (r.avatar) channelAvatars[r.name] = r.avatar;
          });

          await this._connect();

          for (const r of resolved) {
            this.ws.send(
              JSON.stringify({
                event: "pusher:subscribe",
                data: { auth: "", channel: `chatrooms.${r.id}.v2` },
              }),
            );
          }

          return this;
        }

        async _getChannelInfo(channelName) {
          try {
            const resp = await fetch(
              `https://kick.com/api/v2/channels/${channelName}`,
            );
            if (!resp.ok) return null;
            const json = await resp.json();
            const chatroomId = json?.chatroom?.id ?? null;
            const avatar = json?.user?.profile_pic ?? null;
            if (!chatroomId) return null;
            return { chatroomId, avatar };
          } catch {
            return null;
          }
        }

        _connect() {
          return new Promise((resolve, reject) => {
            this.ws = new WebSocket(PUSHER_WS_URL);
            this.ws.addEventListener("open", () => resolve());
            this.ws.addEventListener("error", (e) => reject(e));
            this.ws.addEventListener("message", (e) => {
              try {
                this._handleMessage(JSON.parse(e.data));
              } catch {}
            });
            this.ws.addEventListener("close", () => {
              if (this.onClose) this.onClose();
            });
          });
        }

        _handleMessage(msg) {
          if (!this.onMessage) return;

          let data = null;
          try {
            data = msg.data ? JSON.parse(msg.data) : null;
          } catch {
            data = msg.data ?? null;
          }

          const channel = msg.channel
            ? this.channelMap[msg.channel] || msg.channel
            : null;
          this.onMessage(msg.event, data, channel);
        }

        disconnect() {
          if (this.ws) {
            this.ws.close();
            this.ws = null;
          }
        }
      }

      let chat = null;
      let messageCount = 0;
      let autoScroll = true;

      const channelColors = {};
      const colorPalette = [
        "#53fc18",
        "#e91916",
        "#1e90ff",
        "#ff6ecb",
        "#ffae42",
        "#00ced1",
        "#ff5555",
        "#b39ddb",
        "#f48fb1",
        "#81c784",
        "#4fc3f7",
        "#fff176",
        "#ff8a65",
        "#a1887f",
        "#90a4ae",
      ];
      let colorIndex = 0;

      function getChannelColor(name) {
        if (!channelColors[name]) {
          channelColors[name] = colorPalette[colorIndex % colorPalette.length];
          colorIndex++;
        }
        return channelColors[name];
      }

      function getUserColor(username) {
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
          hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash) % 360;
        return `hsl(${hue}, 70%, 60%)`;
      }

      function renderEmotes(content) {
        if (!content) return "";
        let safe = content
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        safe = safe.replace(/\[emote:(\d+):([^\]]+)\]/g, (match, id, name) => {
          return `<img src="https://files.kick.com/emotes/${id}/fullsize" alt="${name}" title="${name}">`;
        });

        return safe;
      }

      function addChatMessage(channel, username, content) {
        const container = document.getElementById("chatContainer");
        const emptyState = document.getElementById("emptyState");
        if (emptyState) emptyState.remove();

        const div = document.createElement("div");
        div.className = "chat-msg";

        const userColor = getUserColor(username);
        const avatarSrc =
          channel && channelAvatars[channel] ? channelAvatars[channel] : "";

        let html = "";
        if (avatarSrc) {
          html += `<img class="chat-avatar" src="${avatarSrc}" alt="${channel}" title="${channel}" onerror="this.style.display='none'">`;
        } else if (channel) {
          const channelColor = getChannelColor(channel);
          html += `<span class="chat-avatar" style="background:${channelColor};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0e0e10" title="${channel}">${channel.charAt(0).toUpperCase()}</span>`;
        }
        html += `<span class="chat-msg-body">`;
        html += `<span class="chat-username" style="color:${userColor}">${username}</span>`;
        html += `<span class="chat-content">${renderEmotes(content)}</span>`;
        html += `</span>`;

        div.innerHTML = html;
        container.appendChild(div);

        messageCount++;

        while (container.children.length > 500) {
          container.removeChild(container.firstChild);
        }

        if (autoScroll) {
          container.scrollTop = container.scrollHeight;
        }
      }

      function addSystemMessage(text) {
        const container = document.getElementById("chatContainer");
        const div = document.createElement("div");
        div.className = "system-msg";
        div.textContent = text;
        container.appendChild(div);
        if (autoScroll) {
          container.scrollTop = container.scrollHeight;
        }
      }

      function updateScrollButtonVisibility() {
        const btn = document.getElementById("resumeScrollBtn");
        if (autoScroll) {
          btn.classList.remove("visible");
        } else {
          btn.classList.add("visible");
        }
      }

      document
        .getElementById("chatContainer")
        .addEventListener("scroll", function () {
          const el = this;
          autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 60;
          updateScrollButtonVisibility();
        });

      function resumeAutoScroll() {
        const container = document.getElementById("chatContainer");
        container.scrollTop = container.scrollHeight;
        autoScroll = true;
        updateScrollButtonVisibility();
      }

      function toggleControls() {
        const wrapper = document.getElementById("controlsWrapper");
        const toggle = document.getElementById("headerToggle");
        wrapper.classList.toggle("open");
        toggle.classList.toggle("open");
      }

      async function connect() {
        const input = document.getElementById("channelInput").value.trim();
        if (!input) return;

        const channels = input
          .split(",")
          .map((c) => c.trim().toLowerCase())
          .filter(Boolean);

        if (channels.length === 0) return;

        document.getElementById("connectBtn").disabled = true;
        document.getElementById("disconnectBtn").disabled = false;

        try {
          chat = await KickChat.listen(channels, (event, data, channel) => {
            if (event === "App\\Events\\ChatMessageEvent") {
              const username = data?.sender?.username || "unknown";
              const content = data?.content || "";
              addChatMessage(channel, username, content);
            }
          });

          chat.onClose = () => {
            document.getElementById("connectBtn").disabled = false;
            document.getElementById("disconnectBtn").disabled = true;
            addSystemMessage("Connection closed.");
          };

          addSystemMessage(`Connected to: ${channels.join(", ")}`);

          const wrapper = document.getElementById("controlsWrapper");
          const toggle = document.getElementById("headerToggle");
          wrapper.classList.remove("open");
          toggle.classList.remove("open");
        } catch (err) {
          document.getElementById("connectBtn").disabled = false;
          document.getElementById("disconnectBtn").disabled = true;
          addSystemMessage(`Error: ${err.message}`);
        }
      }

      function disconnect() {
        if (chat) {
          chat.disconnect();
          chat = null;
        }
        document.getElementById("connectBtn").disabled = false;
        document.getElementById("disconnectBtn").disabled = true;
        addSystemMessage("Disconnected by user.");
      }

      function clearChat() {
        const container = document.getElementById("chatContainer");
        container.innerHTML = "";
        messageCount = 0;
      }

      document
        .getElementById("channelInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") connect();
        });
    </script>
  </body>
</html>
